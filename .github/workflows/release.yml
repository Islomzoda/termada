name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write   # push the Docker image to ghcr.io

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
      - name: Run tests before releasing
        run: go test -p 1 ./...   # -p 1: serialize packages (avoid cross-package PTY contention)
      - name: Log in to GHCR (for the Docker image)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: goreleaser/goreleaser-action@v6
        with:
          # Pin the snapshot-tested release tool for reproducible tag builds.
          version: 'v2.17.0'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          # Release signing (optional): add these repo secrets to make self-update
          # require a valid ed25519 signature on checksums.txt. Empty = unsigned
          # releases keep working (self-update verifies the checksum only).
          TERMADA_RELEASE_PRIVKEY: ${{ secrets.TERMADA_RELEASE_PRIVKEY }}
          TERMADA_RELEASE_PUBKEY: ${{ secrets.TERMADA_RELEASE_PUBKEY }}
