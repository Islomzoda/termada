# termada config — copy to ~/.config/termada/config.yaml
# Credentials live in the encrypted vault (termada vault ...), never here.

dashboard:
  enabled: true
  open_browser: false
  # local_trust (default true): on your own machine, opening http://127.0.0.1:7717
  # just works — no token. The loopback Host/Origin checks already block websites
  # and remote hosts. Set false on a SHARED/multi-user box to require the token
  # even on loopback (other local users could otherwise reach the dashboard).
  local_trust: true
http:
  bind: 127.0.0.1:7717

notifications:
  desktop: true
  telegram:
    enabled: false
    bot_token: ${TG_TOKEN}
    chat_id: ${TG_CHAT}
    allowed_user_ids: []

defaults:
  timeout_ms: 30000
  output_retention_bytes: 5000000
  max_foreground_jobs: 8
  max_jobs_per_agent: 0          # per-agent concurrent-job cap (0 = unlimited)
  confirm_timeout_ms: 120000

vault:
  backend: encrypted_file        # encrypted_file (age, default) | keychain
  file: ~/.config/termada/vault.age

agents:
  - id: claude-code
    policy: prod-safe
    # Optional: bind this id to a secret token so `owner` can't be spoofed.
    # The shim presents it via `serve --stdio --token <t>` (or $TERMADA_AGENT_TOKEN);
    # the daemon resolves the token to this id and ignores any asserted owner.
    token: ${CLAUDE_AGENT_TOKEN}
  - id: cursor
    policy: read-only

policies:
  prod-safe:
    deny: ["rm -rf /", "DROP DATABASE"]
    confirm: ["rm -rf*", "DROP*", "systemctl stop*"]
    auto_answer:
      - { match: "[Y/n]", send: "y" }     # safe prompts only; host-key is NOT auto-answered
  read-only:
    allow: ["ls", "cat", "tail", "git status", "docker ps"]
    deny: ["*"]

redaction:
  - "(?i)api[_-]?key\\s*=\\s*\\S+"

servers:
  - name: prod
    host: prod.example.com
    user: deploy
    # auth is OPTIONAL: a vault entry name to use a Termada-stored credential.
    # Omit it to connect with your own ssh-agent / ~/.ssh key (no vault needed) —
    # if you can already `ssh deploy@prod`, so can Termada.
    auth: prod-ssh-key
    tags: [web, prod]
    tmux: auto

recipes:
  deploy:
    target: prod
    steps:
      - ["git", "pull"]
      - ["docker", "compose", "build"]
      - ["docker", "compose", "up", "-d"]
