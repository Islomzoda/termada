# goreleaser config — cross-platform release builds + checksums.
# Run by .github/workflows/release.yml on a tag push. Signing/notarization steps
# are gated on release secrets (Apple Developer ID, Windows cert) and are no-ops
# until those are configured (spec DI-1, phase 4).
version: 2

project_name: termada

before:
  hooks:
    - go mod tidy

builds:
  - id: termada
    main: ./cmd/termada
    binary: termada
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      # When the release-signing public key is provided (repo secret →
      # TERMADA_RELEASE_PUBKEY env), embed it so self-update REQUIRES a valid
      # ed25519 signature on checksums.txt. Empty when unset (signature step off).
      - -X github.com/termada/termada/internal/selfupdate.ReleasePublicKey={{ if isEnvSet "TERMADA_RELEASE_PUBKEY" }}{{ .Env.TERMADA_RELEASE_PUBKEY }}{{ end }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: termada
    # Matches the asset name the in-binary updater expects:
    #   termada_<os>_<arch>.tar.gz
    name_template: "termada_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

dockers:
  # Publishes ghcr.io/islomzoda/termada (amd64) so the server is installable from
  # an OCI package — what the official MCP registry / server.json points at.
  - id: termada
    ids: [termada]
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.release
    image_templates:
      - "ghcr.io/islomzoda/termada:{{ .Version }}"
      - "ghcr.io/islomzoda/termada:latest"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/Islomzoda/termada"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"
      # Required by the MCP registry to prove this image belongs to the server.
      - "--label=io.modelcontextprotocol.server.name=io.github.Islomzoda/termada"

nfpms:
  - id: termada
    package_name: termada
    vendor: termada
    homepage: https://github.com/Islomzoda/termada
    maintainer: termada
    description: The reliable, transparent terminal runtime for AI agents.
    license: Apache-2.0
    formats: [deb, rpm]
    bindir: /usr/bin
    dependencies: [bash]

brews:
  - name: termada
    repository:
      owner: Islomzoda
      name: homebrew-tap
      # PAT with write access to the tap repo (the default GITHUB_TOKEN can't push
      # to a separate repo). Set as the HOMEBREW_TAP_TOKEN secret on this repo.
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/Islomzoda/termada
    description: The reliable, transparent terminal runtime for AI agents.
    license: Apache-2.0
    dependencies:
      - name: bash

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# Sign checksums.txt with the release ed25519 key so the in-binary self-update can
# verify it (selfupdate.VerifyEd25519 against the embedded ReleasePublicKey).
# Enable once the key exists: create the keypair (`termada` uses base64 ed25519),
# set repo secrets TERMADA_RELEASE_PRIVKEY + TERMADA_RELEASE_PUBKEY, pass them
# through in release.yml's `env:`, then uncomment. (Left disabled so releases keep
# working until the key is provisioned.)
# signs:
#   - id: checksums
#     artifacts: checksum
#     signature: "${artifact}.sig"
#     output: true
#     cmd: go
#     args: ["run", "./cmd/termada", "sign-checksums", "${artifact}"]

release:
  github:
    owner: Islomzoda
    name: termada
  draft: false
  prerelease: auto

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
