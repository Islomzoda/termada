# goreleaser config — cross-platform release builds + checksums.
# Run by .github/workflows/release.yml on a tag push. Signing/notarization steps
# are gated on release secrets (Apple Developer ID, Windows cert) and are no-ops
# until those are configured (spec DI-1, phase 4).
version: 2

project_name: termada

before:
  hooks:
    - go mod tidy

builds:
  - id: termada
    main: ./cmd/termada
    binary: termada
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: termada
    # Matches the asset name the in-binary updater expects:
    #   termada_<os>_<arch>.tar.gz
    name_template: "termada_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

nfpms:
  - id: termada
    package_name: termada
    vendor: termada
    homepage: https://github.com/Islomzoda/termada
    maintainer: termada
    description: The reliable, transparent terminal runtime for AI agents.
    license: Apache-2.0
    formats: [deb, rpm]
    bindir: /usr/bin
    dependencies: [bash]

brews:
  - name: termada
    repository:
      owner: Islomzoda
      name: homebrew-tap
    homepage: https://github.com/Islomzoda/termada
    description: The reliable, transparent terminal runtime for AI agents.
    license: Apache-2.0
    dependencies:
      - name: bash

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: Islomzoda
    name: termada
  draft: false
  prerelease: auto

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
