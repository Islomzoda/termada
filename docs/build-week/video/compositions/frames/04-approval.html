<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Frame 4 - Human approval is the boundary</title>
  </head>
  <body>
    <template>
      <style>
        @font-face {
          font-family: "Space Grotesk";
          src: local("Space Grotesk");
        }

        @font-face {
          font-family: "IBM Plex Mono";
          src: local("IBM Plex Mono");
        }

        * {
          box-sizing: border-box;
        }

        #root {
          position: absolute;
          inset: 0;
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          color: #eef2f6;
          font-family: "Space Grotesk", Inter, system-ui, sans-serif;
          letter-spacing: 0;
        }

        .scene-fill {
          position: absolute;
          inset: 0;
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          background: #0b0f14;
        }

        .scene-header {
          position: absolute;
          top: 40px;
          right: 96px;
          left: 96px;
          display: flex;
          align-items: center;
          justify-content: space-between;
          height: 48px;
          border-bottom: 1px solid #33414d;
        }

        .scene-label,
        .paused-state {
          font-family: "IBM Plex Mono", ui-monospace, monospace;
          font-size: 18px;
          font-weight: 600;
          line-height: 1;
          text-transform: uppercase;
        }

        .scene-label {
          color: #93a1af;
        }

        .scene-label strong {
          margin-left: 14px;
          color: #eef2f6;
          font-family: "Space Grotesk", Inter, system-ui, sans-serif;
          font-size: 23px;
          font-weight: 700;
          text-transform: none;
        }

        .paused-state {
          display: flex;
          align-items: center;
          gap: 12px;
          color: #f2b84b;
        }

        .paused-dot {
          width: 10px;
          height: 10px;
          border-radius: 50%;
          background: #f2b84b;
          box-shadow: 0 0 0 5px rgba(242, 184, 75, 0.14);
        }

        .capture-window {
          position: absolute;
          top: 112px;
          left: 96px;
          width: 1728px;
          height: 814px;
          overflow: hidden;
          background: #111820;
          border: 1px solid #33414d;
        }

        .capture-world {
          position: absolute;
          top: 0;
          left: 0;
          width: 1728px;
          height: 1080px;
          transform-origin: 56% 25%;
          will-change: transform;
        }

        .capture-image {
          position: absolute;
          inset: 0;
          display: block;
          width: 1728px;
          height: 1080px;
          max-width: none;
          object-fit: fill;
        }

        .approval-focus {
          position: absolute;
          top: 244px;
          left: 372px;
          width: 1298px;
          height: 94px;
          border: 2px solid #f2b84b;
          box-shadow:
            inset 0 0 0 1px rgba(242, 184, 75, 0.32),
            0 0 0 1px rgba(11, 15, 20, 0.7);
          pointer-events: none;
        }

        .approval-focus::before,
        .approval-focus::after {
          position: absolute;
          width: 24px;
          height: 24px;
          content: "";
        }

        .approval-focus::before {
          top: -2px;
          left: -2px;
          border-top: 5px solid #f2b84b;
          border-left: 5px solid #f2b84b;
        }

        .approval-focus::after {
          right: -2px;
          bottom: -2px;
          border-right: 5px solid #f2b84b;
          border-bottom: 5px solid #f2b84b;
        }

        .boundary-tag {
          position: absolute;
          top: 18px;
          left: 18px;
          display: flex;
          align-items: center;
          gap: 10px;
          padding: 10px 14px;
          border: 1px solid rgba(242, 184, 75, 0.62);
          background: rgba(11, 15, 20, 0.94);
          color: #f2b84b;
          font-family: "IBM Plex Mono", ui-monospace, monospace;
          font-size: 16px;
          font-weight: 600;
          line-height: 1;
          text-transform: uppercase;
        }

        .boundary-tag::before {
          width: 8px;
          height: 8px;
          border-radius: 50%;
          background: #f2b84b;
          content: "";
        }

        .evidence-rail {
          position: absolute;
          right: 96px;
          bottom: 40px;
          left: 96px;
          display: grid;
          height: 92px;
          grid-template-columns: 1.08fr 0.92fr 0.9fr;
          border-top: 1px solid #33414d;
          border-bottom: 1px solid #33414d;
          background: #111820;
        }

        .evidence-item {
          display: grid;
          min-width: 0;
          grid-template-columns: 52px minmax(0, 1fr);
          align-items: center;
          padding: 0 30px;
          border-right: 1px solid #33414d;
        }

        .evidence-item:last-child {
          border-right: 0;
        }

        .evidence-index {
          color: #f2b84b;
          font-family: "IBM Plex Mono", ui-monospace, monospace;
          font-size: 18px;
          font-weight: 600;
          font-variant-numeric: tabular-nums;
        }

        .evidence-copy {
          min-width: 0;
        }

        .evidence-label {
          margin-bottom: 8px;
          color: #93a1af;
          font-size: 14px;
          font-weight: 700;
          line-height: 1;
          text-transform: uppercase;
        }

        .evidence-value {
          overflow: hidden;
          color: #eef2f6;
          font-family: "IBM Plex Mono", ui-monospace, monospace;
          font-size: 22px;
          font-weight: 600;
          line-height: 1.05;
          text-overflow: ellipsis;
          white-space: nowrap;
        }

        .evidence-item:last-child .evidence-value {
          color: #3ecf8e;
          font-family: "Space Grotesk", Inter, system-ui, sans-serif;
          font-size: 23px;
          font-weight: 700;
        }
      </style>

      <div
        id="root"
        data-composition-id="04-approval"
        data-width="1920"
        data-height="1080"
        data-duration="30.6"
      >
        <div
          id="f04-stage"
          class="clip"
          data-start="0"
          data-duration="30.6"
          data-track-index="0"
        >
          <div id="f04-content" class="scene-fill">
            <header id="f04-header" class="scene-header">
              <div class="scene-label">Policy boundary <strong>Human control stays explicit</strong></div>
              <div id="f04-paused" class="paused-state">
                <span class="paused-dot"></span>
                Execution paused
              </div>
            </header>

            <div id="f04-capture" class="capture-window">
              <div id="f04-world" class="capture-world" data-layout-allow-overflow>
                <img
                  id="f04-shot"
                  class="capture-image"
                  src="assets/approval-desktop.jpg"
                  alt="Real Termada Mission Control approval boundary for the protected repair"
                />
                <div id="f04-focus" class="approval-focus" aria-hidden="true"></div>
              </div>
              <div id="f04-boundary-tag" class="boundary-tag">Required approval rule</div>
            </div>

            <section id="f04-evidence" class="evidence-rail" aria-label="Approval evidence">
              <div id="f04-command" class="evidence-item">
                <div class="evidence-index">01</div>
                <div class="evidence-copy">
                  <div class="evidence-label">Exact command</div>
                  <div class="evidence-value">./apply-fix.sh</div>
                </div>
              </div>
              <div id="f04-rule" class="evidence-item">
                <div class="evidence-index">02</div>
                <div class="evidence-copy">
                  <div class="evidence-label">Matched rule</div>
                  <div class="evidence-value">apply-fix.sh*</div>
                </div>
              </div>
              <div id="f04-action" class="evidence-item">
                <div class="evidence-index">03</div>
                <div class="evidence-copy">
                  <div class="evidence-label">Human action</div>
                  <div class="evidence-value">Allow once</div>
                </div>
              </div>
            </section>
          </div>
        </div>

      <script>
        window.__timelines = window.__timelines || {};

        const tl = gsap.timeline({ paused: true });

        tl.fromTo(
          "#f04-content",
          { opacity: 0, scale: 0.992 },
          { opacity: 1, scale: 1, duration: 0.5, ease: "power2.out" },
          0
        );
        tl.fromTo(
          "#f04-header",
          { opacity: 0, y: -18 },
          { opacity: 1, y: 0, duration: 0.45, ease: "power2.out" },
          0.18
        );
        tl.fromTo(
          "#f04-capture",
          { opacity: 0.45 },
          { opacity: 1, duration: 0.55, ease: "power2.out" },
          0.28
        );
        tl.fromTo(
          "#f04-world",
          { scale: 1 },
          { scale: 1.2, duration: 8.2, ease: "power2.inOut" },
          2.15
        );
        tl.fromTo(
          "#f04-focus",
          { opacity: 0.28 },
          { opacity: 1, duration: 0.45, ease: "power1.out" },

        tl.fromTo(

          { opacity: 0, x: -18 },
          { opacity: 1, x: 0, duration: 0.45, ease: "power2.out" },

        tl.fromTo(
          "#f04-evidence",
          { opacity: 0, y: 18 },
          { opacity: 1, y: 0, duration: 0.45, ease: "power2.out" },
          5.2
        );
        tl.fromTo(
          "#f04-command",
          { opacity: 0.18, x: -16 },
          { opacity: 1, x: 0, duration: 0.45, ease: "power2.out" },
          6.0
        );
        tl.fromTo(
          "#f04-rule",
          { opacity: 0.18, x: -16 },
          { opacity: 1, x: 0, duration: 0.45, ease: "power2.out" },
          10.0
        );
        tl.fromTo(
          "#f04-action",
          { opacity: 0.18, x: -16 },
          { opacity: 1, x: 0, duration: 0.45, ease: "power2.out" },
          14.2

        tl.fromTo(
          "#f04-paused",
          { opacity: 0.52 },
          {
            opacity: 1,
            duration: 0.55,
            ease: "power1.inOut",
            yoyo: true,
            repeat: 3
          },
          16.0
        );

        window.__timelines["04-approval"] = tl;
      </script>
    </template>
